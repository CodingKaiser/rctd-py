    <script data-marimo="true">
      function __resizeIframe(obj) {
        const scrollbarHeight = 20; // Max between windows, mac, and linux

        function setHeight() {
          // Guard against race condition where iframe isn't ready
          if (!obj.contentWindow?.document?.documentElement) {
            return;
          }
          const element = obj.contentWindow.document.documentElement;
          // If there is no vertical scrollbar, we don't need to resize the iframe
          if (element.scrollHeight === element.clientHeight) {
            return;
          }

          // Create a new height that includes the scrollbar height if it's visible
          const hasHorizontalScrollbar = element.scrollWidth > element.clientWidth;
          const newHeight = element.scrollHeight + (hasHorizontalScrollbar ? scrollbarHeight : 0);

          // Only update the height if it's different from the current height
          if (obj.style.height !== `${newHeight}px`) {
            obj.style.height = `${newHeight}px`;
          }
        }

        // Resize the iframe to the height of the content and bottom scrollbar height
        setHeight();

        // Resize the iframe when the content changes
        const resizeObserver = new ResizeObserver((_entries) => {
          setHeight();
        });
        // Only observe if iframe content is ready
        if (obj.contentWindow?.document?.body) {
          resizeObserver.observe(obj.contentWindow.document.body);
        }
      }
    </script>

781d717", "config": {"column": null, "disabled": false, "hide_code": true}, "id": "aLJB", "name": "_"}, {"code": "", "code_hash": "358f5ca7398ff3cfdfbe02a1b2a54274", "config": {"column": null, "disabled": false, "hide_code": false}, "id": "nHfw", "name": "_"}, {"code": "", "code_hash": "00bfa64da03d38f214f6122ae486d601", "config": {"column": null, "disabled": false, "hide_code": true}, "id": "xXTn", "name": "_"}, {"code": "", "code_hash": "26996bb7bdb7858ecf12046ca22a1262", "config": {"column": null, "disabled": false, "hide_code": false}, "id": "AjVT", "name": "_"}, {"code": "", "code_hash": "71d90988f1fa760ee589c890899bb686", "config": {"column": null, "disabled": false, "hide_code": true}, "id": "pHFh", "name": "_"}, {"code": "", "code_hash": "7d09017727964e59581037bd067f01f9", "config": {"column": null, "disabled": false, "hide_code": false}, "id": "NCOB", "name": "_"}], "metadata": {"marimo_version": "0.20.4"}, "version": "1"},
            "session": {"cells": [{"code_hash": "1d0db38904205bec4d6f6f6a1f6cec3e", "console": [], "id": "Hbol", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "e08b70dd7a5f50537ed3e9f5ff23b135", "console": [], "id": "MJUe", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch1 id=\"rctd-py-tutorial\"\u003Erctd-py Tutorial\u003C/h1\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Cstrong\u003EGPU-accelerated spatial transcriptomics deconvolution using RCTD (Robust Cell Type Decomposition).\u003C/strong\u003E\u003C/span\u003E\n\u003Cspan class=\"paragraph\"\u003EThis notebook demonstrates an end-to-end RCTD workflow using the same \u003Cstrong\u003ESlide-seq cerebellum\u003C/strong\u003E dataset from the \u003Ca href=\"https://raw.githack.com/dmcable/spacexr/master/vignettes/spatial-transcriptomics.html\" rel=\"noopener noreferrer\" target=\"_blank\"\u003Eoriginal spacexr vignette\u003C/a\u003E:\nloading real single-cell reference and spatial data, building a \u003Ccode\u003EReference\u003C/code\u003E object, running RCTD\nin all three modes (full, doublet, multi), and interpreting the results.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "2255f26079cbf13a1d68fad3727c0988", "console": [], "id": "vblA", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"installation\"\u003EInstallation\u003C/h2\u003E\n\u003Cdiv class=\"language-bash codehilite\"\u003E\u003Cpre\u003E\u003Cspan\u003E\u003C/span\u003E\u003Ccode\u003Epip\u003Cspan class=\"w\"\u003E \u003C/span\u003Einstall\u003Cspan class=\"w\"\u003E \u003C/span\u003Erctd-py\u003Cspan class=\"w\"\u003E   \u003C/span\u003E\u003Cspan class=\"c1\"\u003E# CPU (works everywhere; GPU auto-detected if CUDA available)\u003C/span\u003E\n\u003C/code\u003E\u003C/pre\u003E\u003C/div\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "fa85a25cec6b2402833c2884bed21bd9", "console": [], "id": "bkHC", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "1dc3904682644e9d5736d153cb0fe794", "console": [], "id": "lEQa", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"1-download-the-spacexr-vignette-data\"\u003E1. Download the spacexr Vignette Data\u003C/h2\u003E\n\u003Cspan class=\"paragraph\"\u003EWe use the exact same cerebellum data bundled with the R \u003Ca href=\"https://github.com/dmcable/spacexr\" rel=\"noopener noreferrer\" target=\"_blank\"\u003Espacexr\u003C/a\u003E package:\u003C/span\u003E\n\u003Cul\u003E\n\u003Cli\u003E\u003Cstrong\u003EReference\u003C/strong\u003E: 475 single-cell RNA-seq profiles across 19 cerebellar cell types\u003C/li\u003E\n\u003Cli\u003E\u003Cstrong\u003ESpatial\u003C/strong\u003E: 100 Slide-seq beads from mouse cerebellum\u003C/li\u003E\n\u003C/ul\u003E\n\u003Cspan class=\"paragraph\"\u003EThe data is small (~500 KB) and downloaded directly from the spacexr GitHub repository.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "d4187f560aadd5e681247ed63ef25926", "console": [], "id": "PKri", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "e8b7151d4368bdc7f34064674ec954dc", "console": [], "id": "Xref", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"2-prepare-anndata-objects\"\u003E2. Prepare AnnData Objects\u003C/h2\u003E\n\u003Cspan class=\"paragraph\"\u003EConvert the spacexr CSV format (genes \u00d7 cells) into AnnData objects (cells \u00d7 genes)\nthat \u003Ccode\u003Erctd-py\u003C/code\u003E expects.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "8a54604342f5f1ad6becbbd601ddf6e7", "console": [], "id": "SFPL", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "9cab4dfd1a7df3b9f856397121735019", "console": [], "id": "BYtC", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "f1853975800642876c8c19452f7b3ae1", "console": [], "id": "RGSE", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"3-build-reference\"\u003E3. Build Reference\u003C/h2\u003E\n\u003Cspan class=\"paragraph\"\u003EThe \u003Ccode\u003EReference\u003C/code\u003E class takes a single-cell \u003Ccode\u003EAnnData\u003C/code\u003E object and computes per-type\nexpression profiles (mean UMI-normalized counts). Specify the \u003Ccode\u003Ecell_type_col\u003C/code\u003E\nparameter to point to the column in \u003Ccode\u003E.obs\u003C/code\u003E that holds cell type labels.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "56e831b9ca9e7478d16180925172d670", "console": [], "id": "Kclp", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "ac5caf3b53dd57711f427bad40d4a07c", "console": [], "id": "emfo", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"4-run-rctd\"\u003E4. Run RCTD\u003C/h2\u003E\n\u003Cspan class=\"paragraph\"\u003ERCTD supports three deconvolution modes:\u003C/span\u003E\n\u003Ctable\u003E\n\u003Cthead\u003E\n\u003Ctr\u003E\n\u003Cth\u003EMode\u003C/th\u003E\n\u003Cth\u003EDescription\u003C/th\u003E\n\u003Cth\u003EBest for\u003C/th\u003E\n\u003C/tr\u003E\n\u003C/thead\u003E\n\u003Ctbody\u003E\n\u003Ctr\u003E\n\u003Ctd\u003E\u003Ccode\u003Efull\u003C/code\u003E\u003C/td\u003E\n\u003Ctd\u003EEstimates continuous weights for all cell types simultaneously\u003C/td\u003E\n\u003Ctd\u003EVisium, continuous mixtures\u003C/td\u003E\n\u003C/tr\u003E\n\u003Ctr\u003E\n\u003Ctd\u003E\u003Ccode\u003Edoublet\u003C/code\u003E\u003C/td\u003E\n\u003Ctd\u003EClassifies each bead as singlet or doublet, assigns 1\u20132 types\u003C/td\u003E\n\u003Ctd\u003ESlide-seq, sparse spatial\u003C/td\u003E\n\u003C/tr\u003E\n\u003Ctr\u003E\n\u003Ctd\u003E\u003Ccode\u003Emulti\u003C/code\u003E\u003C/td\u003E\n\u003Ctd\u003EGreedy forward selection of up to 4 cell types per bead\u003C/td\u003E\n\u003Ctd\u003EXenium, MERFISH, dense platforms\u003C/td\u003E\n\u003C/tr\u003E\n\u003C/tbody\u003E\n\u003C/table\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "21dd3f1d8960c9ea5521afb059cd6c0d", "console": [], "id": "Hstk", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch3 id=\"doublet-mode-default-for-slide-seq\"\u003EDoublet Mode (default for Slide-seq)\u003C/h3\u003E\n\u003Cspan class=\"paragraph\"\u003EThis is the mode used in the original spacexr vignette. It classifies each bead as\na singlet (one dominant cell type) or doublet (two cell types).\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "4639d8fc2446fac1d450cd115e6bac57", "console": [], "id": "nWHF", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "35def96869490c3bc1f31a25b4b6a049", "console": [], "id": "iLit", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "ae9ec2c76172f8be62a44fef497346fa", "console": [], "id": "ZHCJ", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch3 id=\"full-mode\"\u003EFull Mode\u003C/h3\u003E\n\u003Cspan class=\"paragraph\"\u003EEstimates a continuous weight vector over all cell types for every bead.\nMost flexible \u2014 recommended when beads may contain mixtures of more than two types.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "1924c12aaf6d3f5a11b57c589e3ec24b", "console": [], "id": "ROlb", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "857de66556852dc90305c604b96e3e33", "console": [], "id": "qnkX", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch3 id=\"multi-mode\"\u003EMulti Mode\u003C/h3\u003E\n\u003Cspan class=\"paragraph\"\u003EGreedy forward selection, adding cell types one at a time until adding another\nno longer improves the fit. Max types per bead controlled by \u003Ccode\u003ERCTDConfig.MAX_MULTI_TYPES\u003C/code\u003E.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "5a244ba1fcd2f8cffbb87f826be8d6b6", "console": [], "id": "TqIu", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "e720250c457beeed9f4d2f58599acb06", "console": [], "id": "Vxnm", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"5-interpreting-results\"\u003E5. Interpreting Results\u003C/h2\u003E\n\u003Cspan class=\"paragraph\"\u003EThe \u003Ccode\u003Eresult_full.weights\u003C/code\u003E matrix has shape \u003Ccode\u003E(n_beads, n_types)\u003C/code\u003E. Each row\nsums to 1 and represents the estimated cell type composition of that bead.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "5357107b365728d2f0db25aa02771aca", "console": [], "id": "DnEU", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "78f26a48b4aca77a301dc11a87c1c424", "console": [], "id": "ulZA", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"6-visualization\"\u003E6. Visualization\u003C/h2\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "55fccbf0d4e4b5c099aad1916e4cefd8", "console": [], "id": "ecfG", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "e007971f33fd5e6206b41c514cb8790e", "console": [], "id": "Pvdt", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch3 id=\"spatial-maps\"\u003ESpatial Maps\u003C/h3\u003E\n\u003Cspan class=\"paragraph\"\u003EEach panel shows the Slide-seq beads colored by the RCTD result for that mode.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "5a5d5ba99cc5596e0f6bdea13159c81b", "console": [], "id": "ZBYS", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "31ebfefce9e62c867742eeb00781d717", "console": [], "id": "aLJB", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch3 id=\"weight-heatmap\"\u003EWeight Heatmap\u003C/h3\u003E\n\u003Cspan class=\"paragraph\"\u003EFull-mode weights across all beads, showing the estimated proportion of each cell type.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "358f5ca7398ff3cfdfbe02a1b2a54274", "console": [], "id": "nHfw", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "00bfa64da03d38f214f6122ae486d601", "console": [], "id": "xXTn", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch3 id=\"doublet-mode-details\"\u003EDoublet Mode Details\u003C/h3\u003E\n\u003Cspan class=\"paragraph\"\u003EFor each bead classified as a doublet, RCTD identifies the two most likely\ncell types and their proportions.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "26996bb7bdb7858ecf12046ca22a1262", "console": [], "id": "AjVT", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}, {"code_hash": "71d90988f1fa760ee589c890899bb686", "console": [], "id": "pHFh", "outputs": [{"data": {"text/markdown": "\u003Cspan class=\"markdown prose dark:prose-invert contents\"\u003E\u003Ch2 id=\"7-configuration\"\u003E7. Configuration\u003C/h2\u003E\n\u003Cspan class=\"paragraph\"\u003E\u003Ccode\u003ERCTDConfig\u003C/code\u003E controls all algorithm hyperparameters:\u003C/span\u003E\n\u003Ctable\u003E\n\u003Cthead\u003E\n\u003Ctr\u003E\n\u003Cth\u003EParameter\u003C/th\u003E\n\u003Cth\u003EDefault\u003C/th\u003E\n\u003Cth\u003EDescription\u003C/th\u003E\n\u003C/tr\u003E\n\u003C/thead\u003E\n\u003Ctbody\u003E\n\u003Ctr\u003E\n\u003Ctd\u003E\u003Ccode\u003EUMI_min\u003C/code\u003E\u003C/td\u003E\n\u003Ctd\u003E100\u003C/td\u003E\n\u003Ctd\u003EMinimum UMI count to include a bead\u003C/td\u003E\n\u003C/tr\u003E\n\u003Ctr\u003E\n\u003Ctd\u003E\u003Ccode\u003EN_fit\u003C/code\u003E\u003C/td\u003E\n\u003Ctd\u003E1000\u003C/td\u003E\n\u003Ctd\u003ENumber of beads used to estimate sigma\u003C/td\u003E\n\u003C/tr\u003E\n\u003Ctr\u003E\n\u003Ctd\u003E\u003Ccode\u003EMAX_MULTI_TYPES\u003C/code\u003E\u003C/td\u003E\n\u003Ctd\u003E4\u003C/td\u003E\n\u003Ctd\u003EMax cell types per bead in multi mode\u003C/td\u003E\n\u003C/tr\u003E\n\u003Ctr\u003E\n\u003Ctd\u003E\u003Ccode\u003Emax_iter\u003C/code\u003E\u003C/td\u003E\n\u003Ctd\u003E50\u003C/td\u003E\n\u003Ctd\u003EMaximum IRWLS iterations\u003C/td\u003E\n\u003C/tr\u003E\n\u003Ctr\u003E\n\u003Ctd\u003E\u003Ccode\u003Edoublet_mode_alpha\u003C/code\u003E\u003C/td\u003E\n\u003Ctd\u003E0.01\u003C/td\u003E\n\u003Ctd\u003ERegularization strength in doublet mode\u003C/td\u003E\n\u003C/tr\u003E\n\u003C/tbody\u003E\n\u003C/table\u003E\n\u003Cspan class=\"paragraph\"\u003EThe \u003Ccode\u003Ebatch_size\u003C/code\u003E argument to \u003Ccode\u003Erun_rctd\u003C/code\u003E controls how many beads are processed\nper GPU kernel launch. Larger values use more VRAM but may be faster.\u003C/span\u003E\u003C/span\u003E"}, "type": "data"}]}, {"code_hash": "7d09017727964e59581037bd067f01f9", "console": [], "id": "NCOB", "outputs": [{"data": {"text/plain": ""}, "type": "data"}]}], "metadata": {"marimo_version": "0.20.4", "script_metadata_hash": null}, "version": "1"},
            "runtimeConfig": null,
        };
    </script>
